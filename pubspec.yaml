name: neo_bank
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  bloc: ^9.2.1
  dio: ^5.9.2
  get_it: ^9.2.1
  go_router: ^17.3.0
  equatable: ^2.0.8
  flutter_screenutil: ^5.9.3
  font_awesome_flutter: 11.0.0
  flutter_bloc: ^9.1.1
  supabase_flutter: ^2.14.2
  shared_preferences: ^2.5.5
  flutter_svg: ^2.3.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/app_icon_1024.png"
  min_sdk_android: 21

  adaptive_icon_background: "#070357"
  adaptive_icon_foreground: "assets/logo/app_icon_1024.png"

  remove_alpha_ios: true
  background_color_ios: "#070357"

  macos:
    generate: true
    image_path: "assets/logo/app_icon_1024.png"

flutter:
  uses-material-design: true

  assets:
    - assets/logo/

  fonts:
    - family: IRANYekan
      fonts:
        - asset: assets/fonts/IRANYekanRegular.ttf
        - asset: assets/fonts/IRANYekanMedium.ttf
          weight: 500
        - asset: assets/fonts/IRANYekanBold.ttf
          weight: 700